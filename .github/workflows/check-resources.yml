name: Validar Recursos

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'bloques-de-funcion/**'
      - 'tipos-de-datos/**'
      - 'bloques-de-organizacion/**'
      - 'hmi/**'
      - 'plantillas-de-proyecto/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar estructura de subcarpetas
        run: |
          ERROR=0
          MISSING_XML=0
          # Carpetas a revisar
          DIRS="bloques-de-funcion tipos-de-datos bloques-de-organizacion hmi plantillas-de-proyecto"

          for d in $DIRS; do
            if [ -d "$d" ]; then
              # Buscar subcarpetas de primer nivel (cada recurso)
              for sub in $(find "$d" -maxdepth 1 -mindepth 1 -type d); do
                echo "Revisando recurso: $sub"

                # README.md es OBLIGATORIO. Si falta, error duro y no se evalúa
                # el resto del recurso (no tiene sentido avisar sobre el .xml
                # de algo que ni siquiera tiene documentación).
                if [ ! -f "$sub/README.md" ]; then
                  echo "❌ Error: Falta README.md en $sub"
                  ERROR=1
                else
                  # XML es opcional mientras el recurso está en estado "documentado"
                  # (pendiente de exportar desde TIA Portal). Genera aviso, no error.
                  if ! ls "$sub"/*.xml >/dev/null 2>&1; then
                    echo "⚠️  Aviso: $sub tiene README pero todavía no .xml (estado 'documentado')"
                    MISSING_XML=$((MISSING_XML + 1))
                  fi
                fi
              done
            fi
          done

          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "La validación ha fallado. Asegúrate de incluir un README.md en la carpeta de tu recurso."
            exit 1
          else
            if [ $MISSING_XML -gt 0 ]; then
              echo ""
              echo "✅ Estructura correcta. $MISSING_XML recurso(s) sin .xml todavía (estado 'documentado')."
            else
              echo ""
              echo "✅ ¡Estructura correcta y todos los recursos tienen .xml!"
            fi
          fi
